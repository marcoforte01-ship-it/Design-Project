<!DOCTYPE html>
<html>
    <head>
        <title>Habitat | Reviews</title>
        <link rel="stylesheet" href="reviews.css">
    </head>
        <body>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        
        <div class="topnav">
            <a href="home.html"><i class="fa fa-fw fa-home"></i>Home</a>
            <a href="about.html"><i class="fa fa-fw fa-info-circle"></i>About</a>
            <a href="shop.html"><i class="fa fa-fw fa-shopping-cart"></i>Shop</a>
            <a href="reviews.html"><i class="fa fa-fw fa-star"></i>Reviews</a>
            <a href="contact.html"><i class="fa fa-fw fa-envelope"></i>Contact Us</a>
            <input type="text" class="search" placeholder="Search..">
        </div>

        <h6>Leave a Review!</h6>

        <form class="review-form">

            <label for="fname"></label>
            <input type="text" id="fname" name="fname" required placeholder="Full Name"><br>

            <label for="message"></label><br>
            <input type="text" id="message" name="message" placeholder="Message"><br>

            <input type="radio" id="rating1" name="rating" required>
            <label for="rating1"><i class="fa fa-star checked"></i>1</label>

            <input type="radio" id="rating2" name="rating" required>
            <label for="rating2"><i class="fa fa-star checked"></i>2</label>

            <input type="radio" id="rating3" name="rating" required>
            <label for="rating3"><i class="fa fa-star checked"></i>3</label>

            <input type="radio" id="rating4" name="rating" required>
            <label for="rating4"><i class="fa fa-star checked"></i>4</label>

            <input type="radio" id="rating5" name="rating" required>
            <label for="rating5"><i class="fa fa-star checked"></i>5</label><br>

            <input type="submit" value="Submit">
          </form>
        </body>
</html>

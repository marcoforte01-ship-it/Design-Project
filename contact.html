    <div class="background-container">
        <form class="contact-form">

            <label for="fname"></label>
            <input type="text" id="fname" name="fname" required placeholder="Full Name"><br>

            <label for="phonenumber"></label><br>
            <input type="tel" id="phonenumber" name="phonenumber" pattern="[0-9\s\-\+]*" title="Please enter a valid phone number" placeholder="Phone Number (Optional)">

            <label for="email"></label><br>
            <input type="email" id="email" name="email" placeholder="Email address">

            <label for="message"></label><br>
